name: Weekly Sauna News

on:
  schedule:
    - cron: '0 6 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate weekly edition
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ISSUE_DATE="$(date -u +%F)"
          pnpm run generate:news -- --date "$ISSUE_DATE" --force

      - name: Verify build
        run: pnpm build

      - name: Commit generated edition
        run: |
          if [ -z "$(git status --porcelain -- src/content/news src/data/news-briefs public/images/news)" ]; then
            echo "No news changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/news src/data/news-briefs public/images/news
          git commit -m "Add weekly sauna news edition"
          git push
